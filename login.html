<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Hawkline Express</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1F3B;
    --slate:#2E3454;
    --amber:#E8A33D;
    --paper:#F5F3EE;
    --teal:#4C8C8C;
    --line: rgba(27,31,59,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    line-height:1.5;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1{font-family:'Fraunces',serif; font-weight:600; letter-spacing:-0.01em;}
  a{color:inherit; text-decoration:none;}
  .mono{font-family:'JetBrains Mono',monospace; letter-spacing:0.02em;}

  :focus-visible{outline:2px solid var(--teal); outline-offset:3px;}

  header{
    padding:18px 32px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-family:'Fraunces',serif; font-weight:700; font-size:1.25rem;
    max-width:1180px; margin:0 auto;
  }
  .brand svg{width:26px; height:26px;}

  .login-wrap{
    min-height:calc(100vh - 68px);
    display:flex; align-items:center; justify-content:center;
    padding:60px 24px;
  }
  .login-card{
    width:100%; max-width:420px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:4px;
    padding:48px 40px;
    position:relative;
  }
  .login-card::before{
    content:'';
    position:absolute; top:-1px; left:-1px; right:-1px; height:3px;
    background:linear-gradient(90deg, var(--amber), var(--teal));
    border-radius:4px 4px 0 0;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:0.76rem; color:var(--teal);
    text-transform:uppercase; letter-spacing:0.12em; margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);}
  .login-card h1{font-size:1.8rem; margin-bottom:8px;}
  .login-card .sub{color:var(--slate); font-size:0.92rem; margin-bottom:32px;}

  .field{margin-bottom:20px;}
  .field label{
    display:block; font-size:0.8rem; font-weight:600; margin-bottom:8px;
    color:var(--ink);
  }
  .field input{
    width:100%; padding:13px 14px; border:1px solid var(--line);
    border-radius:3px; background:#fff; font-family:'Inter',sans-serif;
    font-size:0.95rem; color:var(--ink); transition:border-color 0.2s ease;
  }
  .field input::placeholder{color:#A6A9BC;}
  .field input:focus{outline:none; border-color:var(--teal);}

  .row-between{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:28px; font-size:0.85rem;
  }
  .remember{display:flex; align-items:center; gap:8px; color:var(--slate);}
  .remember input{width:14px; height:14px; accent-color:var(--teal);}
  .forgot{color:var(--teal); font-weight:600;}
  .forgot:hover{color:var(--ink);}

  .btn-primary{
    width:100%; background:var(--ink); color:var(--paper); padding:14px 26px;
    border:none; border-radius:3px; font-weight:600; font-size:0.95rem;
    cursor:pointer; transition:background 0.2s ease, transform 0.2s ease;
    font-family:'Inter',sans-serif;
  }
  .btn-primary:hover{background:var(--teal); transform:translateY(-1px);}

  .divider{
    display:flex; align-items:center; gap:14px; margin:28px 0;
    font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:#A6A9BC;
  }
  .divider::before, .divider::after{
    content:''; flex:1; height:1px; background:var(--line);
  }

  .signup-line{
    text-align:center; font-size:0.88rem; color:var(--slate);
  }
  .signup-line a{color:var(--teal); font-weight:600;}
  .signup-line a:hover{color:var(--ink);}

  .form-msg{
    font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--teal);
    margin-bottom:18px; min-height:18px;
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="brand">
    <svg viewBox="0 0 200 200" width="30" height="30" style="border-radius:50%;">
      <defs>
        <linearGradient id="sunsetSkyLogin" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#2E3454"/>
          <stop offset="45%" stop-color="#9A5B6E"/>
          <stop offset="75%" stop-color="#E8A33D"/>
          <stop offset="100%" stop-color="#F2C879"/>
        </linearGradient>
        <radialGradient id="sunGlowLogin" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FFE3A8"/>
          <stop offset="60%" stop-color="#E8A33D"/>
          <stop offset="100%" stop-color="#E8A33D" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="100" cy="100" r="96" fill="url(#sunsetSkyLogin)"/>
      <circle cx="100" cy="128" r="55" fill="url(#sunGlowLogin)"/>
      <circle cx="100" cy="128" r="30" fill="#FBDDA0" opacity="0.9"/>
      <path d="M0 168 Q 50 150, 100 162 T 200 158 L 200 200 L 0 200 Z" fill="#1B1F3B" opacity="0.55"/>
      <g fill="#1B1F3B">
        <path d="M100 70 C 86 64, 60 58, 30 66 C 50 70, 64 76, 74 84 C 56 84, 34 90, 14 102 C 38 100, 58 102, 72 110 C 60 116, 46 126, 38 140 C 56 130, 72 122, 84 120 C 90 124, 96 128, 100 136 C 104 128, 110 124, 116 120 C 128 122, 144 130, 162 140 C 154 126, 140 116, 128 110 C 142 102, 162 100, 186 102 C 166 90, 144 84, 126 84 C 136 76, 150 70, 170 66 C 140 58, 114 64, 100 70 Z"/>
      </g>
      <circle cx="100" cy="100" r="96" fill="none" stroke="#1B1F3B" stroke-width="1.5" opacity="0.25"/>
    </svg>
    Hawkline Express
  </a>
</header>

<div class="login-wrap">
  <div class="login-card">
    <div class="eyebrow"><span class="dot"></span> CUSTOMER ACCOUNT</div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to track shipments, manage pickups, and view your invoices.</p>

    <form id="loginForm">
      <div class="form-msg" id="formMsg"></div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="row-between">
        <label class="remember">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <div class="divider">OR</div>

    <p class="signup-line">New to Hawkline? <a href="#">Create an account</a></p>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const msg = document.getElementById('formMsg');
    msg.textContent = '> Verifying credentials… (demo form — connect to your auth backend)';
  });
</script>

</body>
</html>
